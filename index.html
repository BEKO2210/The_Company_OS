<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2DD4BF" />
    <meta name="msapplication-TileColor" content="#0A0A0F" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CompanyOS" />

    <title>The Company OS</title>

    <style>
      /* Critical CSS for initial load */
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #0A0A0F; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
      /* iOS safe area support */
      .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .safe-area-pt { padding-top: env(safe-area-inset-top, 0px); }
      /* Prevent text selection on mobile */
      * { -webkit-tap-highlight-color: transparent; }
      /* Prevent pull-to-refresh on body, handle in app */
      body { overscroll-behavior-y: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0A0A0F;color:#E4E4E7;padding:20px;text-align:center;font-family:sans-serif;">
        <div>
          <h1 style="color:#2DD4BF;font-size:1.5rem;margin-bottom:1rem;">The Company OS</h1>
          <p>JavaScript ist erforderlich, um diese Anwendung zu nutzen.</p>
          <p style="color:#71717A;font-size:0.875rem;margin-top:0.5rem;">Bitte aktivieren Sie JavaScript in Ihren Browsereinstellungen.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
