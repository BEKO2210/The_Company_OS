name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user-facing pain or limitation does this solve?
      placeholder: "Today the wizard can't ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the UX / API / behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Approaches you ruled out and why.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (UI)
        - Frontend (Wizard)
        - Frontend (KI-Suche)
        - Backend (API)
        - Backend (Adapter)
        - DX / tooling
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, links, prior art.
