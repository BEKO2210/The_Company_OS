name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: When I click X, the wizard shows Y instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps so a maintainer can hit the same path.
      placeholder: |
        1. Run `npm run dev`
        2. Open http://localhost:5173/
        3. Click "Adapter" step
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit / version
      placeholder: e.g. d07eadd or v0.1.0

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (UI)
        - Frontend (Wizard)
        - Frontend (KI-Suche)
        - Backend (API)
        - Backend (Ollama adapter)
        - Backend (DB / seed)
        - CI / build / tooling
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, browser, Ollama version (if relevant)
      placeholder: |
        - OS: Windows 11
        - Node: 20.x
        - Browser: Chrome 131
        - Ollama: 0.3.x, model mistral-nemo:12b

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or attach screenshots. Wrap logs in ``` triple backticks ```.
