version: 2
updates:
  # Frontend (root package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      react:
        patterns: ["react", "react-dom", "react-router*"]
      radix:
        patterns: ["@radix-ui/*"]
      tailwind:
        patterns: ["tailwindcss", "tailwind-*", "tw-*", "postcss", "autoprefixer"]
      lint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint", "globals"]
      types:
        patterns: ["@types/*"]

  # Backend
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      express:
        patterns: ["express", "cors", "helmet", "@types/express", "@types/cors"]
      jest:
        patterns: ["jest", "ts-jest", "@types/jest", "supertest", "@types/supertest"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
